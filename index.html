<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Game 💖</title>
    <style>
        :root { --pink: #ff4d88; --bg: #fad0c4; }
        body { margin: 0; font-family: sans-serif; background: linear-gradient(135deg,#ff9a9e, var(--bg)); min-height: 100vh; display: flex; justify-content: center; }
        .app { max-width: 400px; width: 100%; padding: 20px; text-align: center; }
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .box { height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(255,255,255,0.4); border: 2px solid white; transition: 0.3s; }
        .card { background: white; padding: 20px; border-radius: 20px; margin: 15px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-height: 50px; font-weight: bold; }
        button, input, select { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; }
        button { background: var(--pink); color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .chat { background: white; height: 100px; overflow-y: auto; text-align: left; font-size: 14px; margin-top: 15px; padding: 10px; border-radius: 10px; }
        #score { font-size: 18px; font-weight: bold; color: white; margin: 10px 0; }
        .dice-rolling { animation: shake 0.1s infinite; }
        @keyframes shake { 0% {transform:rotate(0)} 50% {transform:rotate(5deg)} 100% {transform:rotate(0)} }
    </style>
</head>
<body>

<div class="app">
    <div id="setup">
        <h2 style="color:white;">Lover's Game 💖</h2>
        <input id="roomInput" placeholder="Kode Room (Bebas)">
        <select id="playerInput">
            <option value="p1">👤 Player 1</option>
            <option value="p2">❤️ Player 2</option>
        </select>
        <button onclick="initGame()">MASUK PERMAINAN</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div id="score">Skor: 0 - 0</div>
        <div class="board" id="board"></div>
        <div class="card" id="card">Klik Roll! 🎲</div>
        <button id="rollBtn" onclick="rollDice()">ROLL DICE 🎲</button>
        <div class="chat" id="chat"></div>
        <div style="display:flex; gap:5px;">
            <input id="msg" placeholder="Chat..." style="margin:0">
            <button onclick="sendMsg()" style="width:70px; margin:0">Kirim</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com"></script>
<script src="https://www.gstatic.com"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDy7sqCBGhtjcsITuT4hafOkL31bqM7OAs",
    authDomain: "lovegame-c55b0.firebaseapp.com",
    projectId: "lovegame-c55b0",
    storageBucket: "lovegame-c55b0.firebasestorage.app",
    databaseURL: "https://lovegame-c55b0-default-rtdb.firebaseio.com",
    messagingSenderId: "330187220059",
    appId: "1:330187220059:web:c8cfa1447114a4a63d8b7e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomID = "", myID = "", pos1 = 0, pos2 = 0, turn = "p1", s1 = 0, s2 = 0;
const types = ["fun", "deep", "future", "challenge", "fun", "deep", "future", "challenge", "fun", "deep", "future", "challenge"];
const questions = {
    fun: "Apa hal termanis yang pernah aku lakuin?",
    deep: "Apa ketakutan terbesar kamu dalam hubungan ini?",
    future: "Kita nanti mau punya rumah warna apa?",
    challenge: "Coba peluk layar HP kamu sekarang!"
};

function initGame() {
    roomID = document.getElementById("roomInput").value.trim();
    myID = document.getElementById("playerInput").value;
    if (!roomID) return alert("Isi kode room!");

    document.getElementById("setup").style.display = "none";
    document.getElementById("gameArea").style.display = "block";

    db.ref("rooms/" + roomID).on("value", snap => {
        const d = snap.val();
        if (d) {
            pos1 = d.pos1 || 0; pos2 = d.pos2 || 0;
            turn = d.turn || "p1"; s1 = d.s1 || 0; s2 = d.s2 || 0;
            updateUI();
        } else {
            db.ref("rooms/" + roomID).set({ pos1:0, pos2:0, turn:"p1", s1:0, s2:0 });
        }
    });

    db.ref("chat/" + roomID).limitToLast(10).on("child_added", snap => {
        const m = snap.val();
        document.getElementById("chat").innerHTML += `<div><b>${m.p}:</b> ${m.txt}</div>`;
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    });
}

function updateUI() {
    document.getElementById("score").innerText = `Skor: ${s1} - ${s2}`;
    const b = document.getElementById("board");
    b.innerHTML = "";
    for (let i = 0; i < 12; i++) {
        let div = document.createElement("div");
        div.className = "box " + types[i];
        if (i === pos1) div.innerHTML += "👤";
        if (i === pos2) div.innerHTML += "❤️";
        b.appendChild(div);
    }
    document.getElementById("rollBtn").disabled = (myID !== turn);
}

function rollDice() {
    const btn = document.getElementById("rollBtn");
    btn.classList.add("dice-rolling");
    let count = 0;
    let anim = setInterval(() => {
        document.getElementById("card").innerText = "🎲 " + (Math.floor(Math.random() * 6) + 1);
        if (count++ > 10) {
            clearInterval(anim);
            btn.classList.remove("dice-rolling");
            let dice = Math.floor(Math.random() * 6) + 1;
            document.getElementById("card").innerText = "HASIL: " + dice;
            setTimeout(() => moveStep(dice), 500);
        }
    }, 100);
}

function moveStep(steps) {
    let current = 0;
    let moveInterval = setInterval(() => {
        if (turn === "p1") pos1 = (pos1 + 1) % 12; else pos2 = (pos2 + 1) % 12;
        updateUI();
        if (++current >= steps) {
            clearInterval(moveInterval);
            const currentPos = (turn === "p1") ? pos1 : pos2;
            document.getElementById("card").innerText = questions[types[currentPos]];
            db.ref("rooms/" + roomID).update({
                pos1: pos1, pos2: pos2,
                turn: (turn === "p1" ? "p2" : "p1"),
                s1: (turn === "p1" ? s1 + 1 : s1),
                s2: (turn === "p2" ? s2 + 1 : s2)
            });
        }
    }, 300);
}

function sendMsg() {
    const inp = document.getElementById("msg");
    if (!inp.value) return;
    db.ref("chat/" + roomID).push({ p: myID, txt: inp.value });
    inp.value = "";
}
</script>
</body>
</html>
