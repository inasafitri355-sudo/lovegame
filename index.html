<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Game 💖</title>
    <style>
        :root { 
            --pink: #ff4d88; --bg: #fad0c4; 
            --fun: #ffeb3b; --deep: #9c27b0; --future: #4caf50; --challenge: #f44336;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg,#ff9a9e, var(--bg)); min-height: 100vh; display: flex; justify-content: center; }
        .app { max-width: 400px; width: 100%; padding: 20px; text-align: center; }
        
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .box { 
            height: 70px; border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; font-size: 24px; background: rgba(255,255,255,0.6); 
            border: 3px solid white; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .box.fun { border-color: var(--fun); }
        .box.deep { border-color: var(--deep); }
        .box.future { border-color: var(--future); }
        .box.challenge { border-color: var(--challenge); }

        .card { 
            background: white; padding: 25px; border-radius: 20px; margin: 15px 0; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); min-height: 80px; 
            font-weight: bold; font-size: 18px; color: #333; display: flex; align-items: center; justify-content: center;
        }
        
        button, input, select { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 12px; font-size: 16px; outline: none; }
        button { background: var(--pink); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #d6336c; }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #d6336c; }
        button:disabled { background: #ccc; box-shadow: 0 4px 0 #999; cursor: not-allowed; }
        
        .chat { background: rgba(255,255,255,0.8); height: 120px; overflow-y: auto; text-align: left; font-size: 14px; margin-top: 15px; padding: 10px; border-radius: 12px; border: 1px solid #ddd; }
        #score { font-size: 20px; font-weight: bold; color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.2); }
        .dice-rolling { animation: shake 0.15s infinite; }
        @keyframes shake { 0% {transform: rotate(0) scale(1.1);} 50% {transform: rotate(10deg) scale(1.1);} 100% {transform: rotate(-10deg) scale(1.1);} }
    </style>
</head>
<body>

<div class="app">
    <div id="setup">
        <h1 style="color:white; margin-bottom:0;">Lover's Game 💖</h1>
        <p style="color:white; margin-top:5px;">Main berdua makin romantis!</p>
        <input id="roomInput" placeholder="Ketik Kode Room (Bebas)">
        <select id="playerInput">
            <option value="p1">👤 Player 1 (Aku)</option>
            <option value="p2">❤️ Player 2 (Kamu)</option>
        </select>
        <button onclick="initGame()">MULAI SEKARANG ✨</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div id="score">Skor: 0 - 0</div>
        <div class="board" id="board"></div>
        <div class="card" id="card">Siap main? Klik Roll! 🎲</div>
        <button id="rollBtn" onclick="animateDice()">ROLL DICE 🎲</button>
        <div class="chat" id="chat"></div>
        <div style="display:flex; gap:8px; margin-top:10px;">
            <input id="msg" placeholder="Kirim pesan..." style="margin:0">
            <button onclick="sendMsg()" style="width:80px; margin:0; padding:0;">Kirim</button>
        </div>
    </div>
</div>

<!-- PERBAIKAN: Link Firebase SDK yang Benar -->
<script src="https://www.gstatic.com"></script>
<script src="https://www.gstatic.com"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDy7sqCBGhtjcsITuT4hafOkL31bqM7OAs",
    authDomain: "lovegame-c55b0.firebaseapp.com",
    projectId: "lovegame-c55b0",
    databaseURL: "https://lovegame-c55b0-default-rtdb.firebaseio.com",
    appId: "1:330187220059:web:c8cfa1447114a4a63d8b7e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomID = "", myID = "", pos1 = 0, pos2 = 0, turn = "p1", s1 = 0, s2 = 0;
const types = ["fun", "deep", "future", "challenge", "fun", "deep", "future", "challenge", "fun", "deep", "future", "challenge"];

const questionList = {
    fun: ["Apa kesan pertama pas ketemu aku?", "Kalau kita jadi hewan, jadi apa?", "3 hal yang bikin sayang aku?", "Lagu yang ngingetin ke aku?"],
    deep: ["Takut apa dari hubungan kita?", "Kapan ngerasa bangga sama aku?", "Luka apa yang sembuh pas ada aku?", "Gimana cara nenangin kamu?"],
    future: ["Anniversary nanti kemana?", "Kita 5 tahun lagi ngapain?", "Mau ada ruangan apa di rumah?", "Impian yang mau diwujudin bareng?"],
    challenge: ["Cium layar HP! 😘", "Kirim foto muka jelek!", "Voice note I Love You 5x!", "Ganti status WA jadi namaku!"]
};

function initGame() {
    roomID = document.getElementById("roomInput").value.trim();
    myID = document.getElementById("playerInput").value;
    if (!roomID) return alert("Isi kode room!");

    document.getElementById("setup").style.display = "none";
    document.getElementById("gameArea").style.display = "block";

    db.ref("rooms/" + roomID).on("value", snap => {
        const d = snap.val();
        if (d) {
            pos1 = d.pos1 || 0; pos2 = d.pos2 || 0;
            turn = d.turn || "p1"; s1 = d.s1 || 0; s2 = d.s2 || 0;
            updateUI();
            if(d.lastQ) document.getElementById("card").innerText = d.lastQ;
        } else {
            db.ref("rooms/" + roomID).set({ pos1:0, pos2:0, turn:"p1", s1:0, s2:0, lastQ: "Ayo mulai!" });
        }
    });

    db.ref("chat/" + roomID).limitToLast(10).on("child_added", snap => {
        const m = snap.val();
        document.getElementById("chat").innerHTML += `<div><b>${m.p === 'p1' ? '👤':'❤️'}:</b> ${m.txt}</div>`;
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    });
}

function updateUI() {
    document.getElementById("score").innerText = `Skor: ${s1} - ${s2}`;
    const b = document.getElementById("board");
    b.innerHTML = "";
    for (let i = 0; i < 12; i++) {
        let div = document.createElement("div");
        div.className = "box " + types[i];
        if (i === pos1) div.innerHTML += "👤";
        if (i === pos2) div.innerHTML += "❤️";
        b.appendChild(div);
    }
    const isMyTurn = (myID === turn);
    document.getElementById("rollBtn").disabled = !isMyTurn;
    document.getElementById("rollBtn").innerText = isMyTurn ? "ROLL DICE 🎲" : "Tunggu giliran...";
}

function animateDice() {
    const btn = document.getElementById("rollBtn");
    btn.classList.add("dice-rolling");
    let count = 0;
    let anim = setInterval(() => {
        document.getElementById("card").innerText = "🎲 " + (Math.floor(Math.random() * 6) + 1);
        if (count++ > 10) {
            clearInterval(anim);
            btn.classList.remove("dice-rolling");
            processMove();
        }
    }, 100);
}

function processMove() {
    const dice = Math.floor(Math.random() * 6) + 1;
    let newPos = (myID === "p1") ? (pos1 + dice) % 12 : (pos2 + dice) % 12;
    const type = types[newPos];
    const randomQ = questionList[type][Math.floor(Math.random() * questionList[type].length)];

    const updates = { turn: (myID === "p1" ? "p2" : "p1"), lastQ: `[Dadu: ${dice}] ${randomQ}` };
    if (myID === "p1") { updates.pos1 = newPos; updates.s1 = s1 + 1; }
    else { updates.pos2 = newPos; updates.s2 = s2 + 1; }
    
    db.ref("rooms/" + roomID).update(updates);
}

function sendMsg() {
    const inp = document.getElementById("msg");
    if (!inp.value) return;
    db.ref("chat/" + roomID).push({ p: myID, txt: inp.value });
    inp.value = "";
}
</script>
</body>
</html>
