<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love App 💖</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: linear-gradient(180deg,#ff9a9e,#fad0c4);
    height: 100vh;
    overflow: hidden;
}

.app {
    max-width: 400px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: white;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 18px;
}

.card-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

.card {
    width: 85%;
    height: 280px;
    background: rgba(255,255,255,0.95);
    color: #333;
    border-radius: 25px;
    padding: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    transition: 0.4s;
}

.footer {
    padding: 20px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border-radius: 15px;
    border: none;
}

button {
    background: #ff4d88;
    color: white;
    font-size: 16px;
}

/* 💕 HEART ANIMATION */
.heart {
    position: absolute;
    font-size: 30px;
    animation: float 1s ease-out forwards;
}

@keyframes float {
    0% {transform: translateY(0) scale(1); opacity: 1;}
    100% {transform: translateY(-150px) scale(1.5); opacity: 0;}
}
</style>
</head>

<body>

<div class="app">

<div class="header" id="header">💖 Love App 💖</div>

<div class="card-container" id="container">
<div class="card" id="card">Tap / Swipe 💌</div>
</div>

<div class="footer">
<input id="you" placeholder="Nama kamu">
<input id="dia" placeholder="Nama dia">
<button onclick="start()">Mulai</button>
<button onclick="toggleMusic()">🎵 Music</button>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b9d7b.mp3">
</audio>

<!-- 🔊 SOUND EFFECT -->
<audio id="sfx">
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_0a3f6b9d0f.mp3">
</audio>

</div>

<script>
let turn = true;
let started = false;

let questions = [
"Apa hal yang paling kamu suka dari aku?",
"Kapan kamu paling kangen aku?",
"Gimana masa depan kita?",
"Apa yang bikin kamu bertahan sama aku?",
"Apa mimpi kita bareng?",
"Apa yang bikin kamu takut kehilangan aku?",
"Deskripsikan aku dalam 1 kata",
"Apa yang kamu harapkan dari hubungan ini?"
];

function start(){
let y=document.getElementById("you").value;
let d=document.getElementById("dia").value;

if(!y||!d){
alert("Isi nama dulu 😆");
return;
}

localStorage.setItem("names",JSON.stringify({y,d}));
started=true;

// autoplay fix (user interaction)
document.getElementById("bgm").play().catch(()=>{});

next();
}

function next(){
if(!started)return;

let n=JSON.parse(localStorage.getItem("names"));
let name=turn?n.y:n.d;

document.getElementById("header").innerText="Giliran: "+name;

let random=Math.floor(Math.random()*questions.length);

let card=document.getElementById("card");
card.style.transform="scale(0.8)";
card.style.opacity="0";

setTimeout(()=>{
card.innerText=questions[random];
card.style.transform="scale(1)";
card.style.opacity="1";
},200);

// 🔊 SOUND
let sfx=document.getElementById("sfx");
sfx.currentTime=0;
sfx.play();

createHearts();

turn=!turn;
}

// 💕 HEART EFFECT
function createHearts(){
let container=document.getElementById("container");

for(let i=0;i<6;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerText="💖";

heart.style.left=Math.random()*80+"%";

container.appendChild(heart);

setTimeout(()=>heart.remove(),1000);
}
}

// TAP
document.getElementById("card").addEventListener("click", next);

// SWIPE
let startX=0;
document.getElementById("card").addEventListener("touchstart", e=>{
startX=e.touches[0].clientX;
});

document.getElementById("card").addEventListener("touchend", e=>{
let endX=e.changedTouches[0].clientX;

if(Math.abs(endX-startX)>50){
next();
}
});

function toggleMusic(){
let m=document.getElementById("bgm");
if(m.paused)m.play();
else m.pause();
}
</script>

</body>
</html>
